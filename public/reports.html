<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My reports - JMAnalyzeTool</title>
<script src="/auth-client.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060709;--g:#00e5a0;--blue:#60a5fa;--purple:#a78bfa;
  --amber:#f59e0b;--red:#ff4757;
  --text:#f0f2fa;--muted:#4a5070;--dim:#252838;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --glass:rgba(255,255,255,.03);--glass2:rgba(255,255,255,.06);
  --bg2:#090b10;--nav-bg:rgba(6,7,9,.85);--mesh-a:rgba(96,165,250,.09);--mesh-b:rgba(167,139,250,.08);--noise:.025;
}
[data-theme="glass"]{
  --bg:#11151f;--text:#f6f8ff;--muted:#8a94ad;--dim:#5d6680;
  --border:rgba(255,255,255,.14);--border2:rgba(255,255,255,.2);
  --glass:rgba(255,255,255,.085);--glass2:rgba(255,255,255,.14);
  --bg2:#171d2a;--nav-bg:rgba(19,23,34,.72);--mesh-a:rgba(96,165,250,.16);--mesh-b:rgba(167,139,250,.14);--noise:.035;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
.syne{font-family:'Syne',sans-serif;font-weight:800}
body{background:radial-gradient(circle at 14% 0%,var(--mesh-a),transparent 34%),radial-gradient(circle at 86% 12%,var(--mesh-b),transparent 32%),linear-gradient(180deg,var(--bg),var(--bg2))}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:var(--noise);pointer-events:none;z-index:100}
.mesh{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.mesh::before{content:'';position:absolute;top:-20%;left:-10%;width:60%;height:60%;background:radial-gradient(ellipse,var(--mesh-a) 0%,transparent 70%);filter:blur(70px)}
.mesh::after{content:'';position:absolute;bottom:-20%;right:-10%;width:50%;height:50%;background:radial-gradient(ellipse,var(--mesh-b) 0%,transparent 70%);filter:blur(80px)}

/* NAV */
.nav{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:54px;background:var(--nav-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-logo{display:flex;align-items:center;gap:10px;font-size:16px;letter-spacing:-.03em}
.nav-logo-icon{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--g),var(--blue));display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(0,229,160,.4)}
.nav-links{display:flex;gap:6px}
.nav-btn{border:1px solid var(--border2);background:var(--glass);color:var(--text);border-radius:8px;padding:7px 12px;text-decoration:none;font-weight:700;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:12px;transition:all .2s}
.nav-btn:hover{background:var(--glass2);border-color:rgba(255,255,255,.15)}
.nav-btn.danger{background:rgba(255,71,87,.12);color:var(--red);border-color:rgba(255,71,87,.3)}
.nav-right{display:flex;align-items:center;gap:10px}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--g),var(--blue));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#020c07;box-shadow:0 0 10px rgba(0,229,160,.4)}
.theme-switch{display:flex;gap:4px;padding:3px;border:1px solid var(--border);background:var(--glass);border-radius:10px}
.theme-btn{border:0;background:transparent;color:var(--muted);border-radius:7px;padding:5px 9px;font:700 11px 'Space Grotesk',sans-serif;cursor:pointer}
.theme-btn.active{background:var(--glass2);color:var(--text);box-shadow:inset 0 0 0 1px var(--border2)}

/* MAIN */
.wrap{max-width:1200px;margin:0 auto;padding:28px 24px;position:relative;z-index:1}
.page-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px}
.page-title{font-size:24px;letter-spacing:-.04em;margin-bottom:3px}
.page-sub{color:var(--muted);font-size:13px}
.btn-glow{border:none;border-radius:10px;background:var(--g);color:#020c07;padding:10px 18px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;cursor:pointer;box-shadow:0 0 20px rgba(0,229,160,.3);transition:all .2s}
.btn-glow:hover{box-shadow:0 0 32px rgba(0,229,160,.5);transform:translateY(-1px)}

/* GRID */
.grid{display:grid;grid-template-columns:320px 1fr;gap:14px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}

/* REPORT ITEMS */
.report-item{background:var(--glass);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.report-item:hover,.report-item.selected{border-color:rgba(0,229,160,.4);background:rgba(0,229,160,.05);box-shadow:0 0 16px rgba(0,229,160,.12)}
.report-title{font-size:13px;font-weight:700;margin-bottom:6px;line-height:1.4}
.report-meta{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:5px;font-size:11px;color:var(--muted)}
.report-date{font-size:11px;color:var(--muted)}
.report-actions{display:flex;gap:7px;margin-top:10px}
.badge{display:inline-flex;align-items:center;padding:1px 6px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.03em}

/* VIEWER */
.viewer{background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:20px 22px;min-height:400px}
.viewer-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;gap:12px}
.viewer-title{font-size:16px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
.viewer-sub{font-size:12px;color:var(--muted)}
.viewer-placeholder{height:320px;background:rgba(255,255,255,.02);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px}
.viewer-empty{color:var(--muted);font-size:13px;text-align:center;padding:60px 20px}
.saved-report-body{background:rgba(255,255,255,.02);border-radius:10px;overflow:auto;min-height:280px;padding:14px}
.report-frame{width:100%;min-height:760px;border:0;border-radius:12px;background:#11151f}
.saved-report-body .panel{display:none}
.saved-report-body .panel.active{display:block}
.saved-report-body .tabs{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 14px}
.saved-report-body .tab{border:1px solid var(--border);background:var(--glass);color:var(--muted);border-radius:8px;padding:7px 12px;font:700 12px 'Space Grotesk',sans-serif;cursor:pointer}
.saved-report-body .tab.active{border-color:rgba(0,229,160,.5);background:rgba(0,229,160,.1);color:var(--g)}
.viewer-actions{display:flex;gap:8px;flex-wrap:wrap}

.muted{color:var(--muted)}
</style>
</head>
<body>
<div class="mesh"></div>

<header class="nav">
  <div class="nav-logo">
    <div class="nav-logo-icon">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <polyline points="1,12 5,7 8,10 11,4 15,7" stroke="#020c07" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="syne">JM<span style="color:var(--g)">Analyze</span>Tool</span>
  </div>
  <nav class="nav-links">
    <div class="theme-switch" aria-label="Theme">
      <button class="theme-btn" data-theme-btn="dark" onclick="setTheme('dark')" type="button">Dark</button>
      <button class="theme-btn" data-theme-btn="glass" onclick="setTheme('glass')" type="button">Glass</button>
    </div>
    <a href="/report" class="nav-btn">New report</a>
    <a id="admin-link" href="/admin" class="nav-btn" style="display:none">Admin</a>
    <button id="logout" class="nav-btn danger">Log out</button>
  </nav>
  <div class="nav-right">
    <div class="avatar" id="avatar">JM</div>
    <span class="muted" id="user-email" style="font-size:12px"></span>
  </div>
</header>

<main class="wrap">
  <div class="page-header">
    <div>
      <div class="syne page-title">My reports</div>
      <div class="page-sub" id="sub">Loading...</div>
    </div>
    <button class="btn-glow" onclick="window.location.href='/report'">+ New report</button>
  </div>

  <div class="grid">
    <section id="list"></section>
    <section class="viewer">
      <div id="viewer" class="viewer-empty">Select a report to view its contents.</div>
    </section>
  </div>
</main>

<script>
const list = document.getElementById('list');
const viewer = document.getElementById('viewer');
let current = null;
let reportCssCache = null;

window.addEventListener('message', event => {
  if (event.data?.type !== 'jm-report-height') return;
  const frame = document.getElementById('report-frame');
  if (frame) frame.style.height = Math.max(760, Number(event.data.height || 0) + 24) + 'px';
});

function setTheme(theme) {
  const next = theme === 'glass' ? 'glass' : 'dark';
  document.documentElement.dataset.theme = next;
  localStorage.setItem('jm-theme', next);
  document.querySelectorAll('[data-theme-btn]').forEach(btn => btn.classList.toggle('active', btn.dataset.themeBtn === next));
}
setTheme(localStorage.getItem('jm-theme') || 'glass');

document.getElementById('logout').onclick = () => window.jmAuth.logout();

document.addEventListener('jm:user', e => {
  const user = e.detail.user;
  if (user.role === 'admin') document.getElementById('admin-link').style.display = 'inline-block';
  const initials = (user.name || user.email).slice(0, 2).toUpperCase();
  document.getElementById('avatar').textContent = initials;
  document.getElementById('user-email').textContent = user.email;
  loadReports();
});

function badgeHtml(text, color) {
  return `<span class="badge" style="background:${color}18;border:1px solid ${color}40;color:${color}">${esc(text)}</span>`;
}

async function loadReports() {
  const res = await fetch('/api/reports');
  const data = await res.json();
  document.getElementById('sub').textContent = `Retention: ${data.retentionDays} days - ${data.reports.length} reports`;

  if (!data.reports.length) {
    list.innerHTML = `<div class="report-item" style="cursor:default;opacity:.6">No reports saved yet.</div>`;
    return;
  }

  list.innerHTML = data.reports.map(r => `
    <article class="report-item" data-id="${r.id}">
      <div class="report-title">${esc(r.title)}</div>
      <div class="report-meta">
        <span>${esc(r.machine || '-')}</span>
        <span style="color:var(--dim)">-</span>
        <span>${esc(r.shift || '-')}</span>
        ${r.route ? badgeHtml(r.route, r.route === 'Complete' ? '#60a5fa' : '#4a5070') : ''}
      </div>
      <div class="report-date">${new Date(r.createdAt).toLocaleString('en-GB')} - expires ${new Date(r.expiresAt).toLocaleDateString('en-GB')}</div>
      <div class="report-actions">
        <button class="nav-btn" type="button" data-open-id="${r.id}">Open report</button>
      </div>
    </article>
  `).join('');

  list.querySelectorAll('.report-item').forEach(item => {
    item.onclick = event => {
      if (event.target.closest('[data-open-id]')) return;
      list.querySelectorAll('.report-item').forEach(i => i.classList.remove('selected'));
      item.classList.add('selected');
      openReport(item.dataset.id);
    };
  });
  list.querySelectorAll('[data-open-id]').forEach(button => {
    button.onclick = event => {
      event.stopPropagation();
      const id = button.dataset.openId;
      const item = list.querySelector(`[data-id="${CSS.escape(id)}"]`);
      list.querySelectorAll('.report-item').forEach(i => i.classList.remove('selected'));
      if (item) item.classList.add('selected');
      openReport(id, true);
    };
  });

  const initialId = new URLSearchParams(window.location.search).get('id');
  if (initialId && data.reports.some(r => r.id === initialId)) {
    const item = list.querySelector(`[data-id="${CSS.escape(initialId)}"]`);
    if (item) item.classList.add('selected');
    openReport(initialId, false);
  }
}

async function openReport(id, updateUrl = true) {
  viewer.innerHTML = `<div class="viewer-empty">Loading...</div>`;
  const res = await fetch('/api/reports/' + encodeURIComponent(id));
  const data = await res.json();
  if (!res.ok) { viewer.innerHTML = `<div class="viewer-empty" style="color:var(--red)">${esc(data.error || 'Failed to open report.')}</div>`; return; }
  current = data.report;
  if (updateUrl) history.replaceState(null, '', `/my-reports?id=${encodeURIComponent(id)}`);
  const safeHtml = cleanSavedReportHtml(current.html);
  const srcdoc = await buildReportFrameSrcdoc(safeHtml);
  viewer.innerHTML = `
    <div class="viewer-header">
      <div>
        <div class="viewer-title">${esc(current.title)}</div>
        <div class="viewer-sub">${esc(current.email)} - ${new Date(current.createdAt).toLocaleString('en-GB')}</div>
      </div>
      <div class="viewer-actions">
        <button class="nav-btn" onclick="document.getElementById('report-frame')?.requestFullscreen?.()">Fullscreen</button>
        <button onclick="deleteCurrent()" style="background:rgba(255,71,87,.12);color:var(--red);border:1px solid rgba(255,71,87,.3);border-radius:8px;padding:7px 13px;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700">Delete</button>
      </div>
    </div>
    <iframe id="report-frame" class="report-frame" title="${esc(current.title)}"></iframe>
  `;
  const frame = document.getElementById('report-frame');
  frame.srcdoc = srcdoc;
  frame.onload = () => {
    try {
      const h = frame.contentDocument.documentElement.scrollHeight;
      frame.style.height = Math.max(760, h + 24) + 'px';
      frame.contentWindow?.postMessage({ type: 'jm-parent-ready' }, '*');
    } catch (_) {}
  };
}

async function getReportCss() {
  if (reportCssCache) return reportCssCache;
  const res = await fetch('/jm-report');
  const html = await res.text();
  const match = html.match(/<style>([\s\S]*?)<\/style>/i);
  reportCssCache = match ? match[1] : '';
  return reportCssCache;
}

async function buildReportFrameSrcdoc(html) {
  const css = await getReportCss();
  return `<!DOCTYPE html><html lang="en" data-theme="${document.documentElement.dataset.theme || 'glass'}"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>${css}
      body{padding:24px 28px;background:radial-gradient(circle at 14% 0%,var(--mesh-a),transparent 34%),radial-gradient(circle at 86% 12%,var(--mesh-b),transparent 32%),linear-gradient(180deg,var(--bg),var(--bg2));}
      .wrap{padding:0;max-width:none}.panel{display:none}.panel.active{display:block}.tabs{display:flex}
    </style></head><body><div class="wrap">${html}</div>
    <script>
      function ensureTabs(){
        if(document.querySelector('.tabs'))return;
        const panels=[...document.querySelectorAll('.panel[id^="tab-"]')];
        if(!panels.length)return;
        const labels={overview:'Overview',operator:'Operator',machine:'Machine',quality:'Quality / Reject',optional:'Optional data',improve:'Improvements'};
        const tabs=document.createElement('div');tabs.className='tabs';tabs.style.display='flex';
        panels.forEach((panel,i)=>{const key=panel.id.replace(/^tab-/,'');const btn=document.createElement('button');btn.className='tab'+(panel.classList.contains('active')||(!i&&!panels.some(p=>p.classList.contains('active'))) ? ' active':'');btn.dataset.tab=key;btn.textContent=labels[key]||key;tabs.appendChild(btn);});
        panels[0].parentNode.insertBefore(tabs,panels[0]);
        if(!panels.some(p=>p.classList.contains('active')))panels[0].classList.add('active');
      }
      function sendHeight(){parent.postMessage({type:'jm-report-height',height:document.documentElement.scrollHeight},'*');}
      function bindTabs(){document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));t.classList.add('active');const p=document.getElementById('tab-'+t.dataset.tab);if(p)p.classList.add('active');setTimeout(sendHeight,0);});}
      function toggleLossDetails(i){const row=document.getElementById('loss-detail-'+i);if(row){row.classList.toggle('open');setTimeout(sendHeight,0);}}
      function toggleLossButton(btn){const explicit=String(btn.getAttribute('onclick')||'').match(/toggleLossDetails\\((\\d+)\\)/);if(explicit)return toggleLossDetails(Number(explicit[1]));const row=btn.closest('tr')?.nextElementSibling;if(row&&row.classList.contains('loss-detail')){row.classList.toggle('open');setTimeout(sendHeight,0);}}
      function bindLossButtons(){document.querySelectorAll('.loss-btn').forEach((btn,i)=>{btn.onclick=e=>{e.preventDefault();e.stopPropagation();const match=String(btn.getAttribute('onclick')||'').match(/toggleLossDetails\\((\\d+)\\)/);toggleLossDetails(match?Number(match[1]):i);};});}
      document.addEventListener('click',e=>{const btn=e.target.closest('.loss-btn');if(!btn)return;e.preventDefault();toggleLossButton(btn);});
      ensureTabs();
      bindTabs();
      bindLossButtons();
      new ResizeObserver(sendHeight).observe(document.body);
      setTimeout(sendHeight,0);
    <\/script></body></html>`;
}

function cleanSavedReportHtml(html) {
  const template = document.createElement('template');
  template.innerHTML = String(html || '');
  template.content.querySelectorAll('#analysis-layer,.analysis-layer,[data-analysis-layer],.live-only').forEach(node => node.remove());
  return template.innerHTML;
}

function bindSavedReportTabs() {
  const root = viewer.querySelector('.saved-report-body');
  if (!root) return;
  const tabs = Array.from(root.querySelectorAll('.tab'));
  const panels = Array.from(root.querySelectorAll('.panel'));
  if (!tabs.length || !panels.length) return;

  function show(tab, index) {
    const key = tab.dataset.tab;
    tabs.forEach(item => item.classList.toggle('active', item === tab));
    panels.forEach(panel => panel.classList.remove('active'));
    const target = key ? root.querySelector(`#tab-${CSS.escape(key)}`) : panels[index];
    (target || panels[index] || panels[0]).classList.add('active');
  }

  tabs.forEach((tab, index) => {
    tab.addEventListener('click', () => show(tab, index));
  });

  const activeTab = tabs.find(tab => tab.classList.contains('active')) || tabs[0];
  show(activeTab, Math.max(0, tabs.indexOf(activeTab)));
}

async function deleteCurrent() {
  if (!current || !confirm('Delete report?')) return;
  const res = await fetch('/api/reports/' + encodeURIComponent(current.id), { method: 'DELETE' });
  if (res.ok) { current = null; viewer.innerHTML = '<div class="viewer-empty">Report deleted.</div>'; loadReports(); }
}

function esc(v) {
  return String(v ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
}
</script>
</body>
</html>
