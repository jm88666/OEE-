<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JMAnalyzeTool v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060709;--g:#00e5a0;--g2:#00b87a;
  --amber:#f59e0b;--red:#ff4757;--blue:#60a5fa;--purple:#a78bfa;
  --text:#f0f2fa;--muted:#4a5070;--dim:#252838;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --glass:rgba(255,255,255,.03);--glass2:rgba(255,255,255,.06);
}
html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
.syne{font-family:'Syne',sans-serif;font-weight:800}
.mono{font-family:'Space Mono',monospace}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.025;pointer-events:none;z-index:1000}
.glass{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px}
.btn-glow{background:var(--g);color:#020c07;border:none;border-radius:10px;font-family:'Space Grotesk',sans-serif;font-weight:700;cursor:pointer;box-shadow:0 0 24px rgba(0,229,160,.35),0 4px 12px rgba(0,0,0,.4);transition:all .2s}
.btn-glow:hover{box-shadow:0 0 36px rgba(0,229,160,.55),0 6px 20px rgba(0,0,0,.5);transform:translateY(-1px)}
.btn-ghost{background:var(--glass);color:var(--text);border:1px solid var(--border2);border-radius:9px;font-family:'Space Grotesk',sans-serif;font-weight:600;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

const C={
  bg:'#060709',g:'#00e5a0',g2:'#00b87a',
  amber:'#f59e0b',red:'#ff4757',blue:'#60a5fa',purple:'#a78bfa',
  text:'#f0f2fa',muted:'#4a5070',dim:'#252838',
  border:'rgba(255,255,255,.06)',border2:'rgba(255,255,255,.1)',
  glass:'rgba(255,255,255,.03)',glass2:'rgba(255,255,255,.06)',
};

// ── SHARED ────────────────────────────────────────────────────
function MeshBg({c1=C.g,c2=C.blue,op=.12}){
  return(
    <div style={{position:'fixed',inset:0,pointerEvents:'none',overflow:'hidden',zIndex:0}}>
      <div style={{position:'absolute',top:'-20%',left:'-10%',width:'60%',height:'60%',background:`radial-gradient(ellipse,${c1}${Math.round(op*255).toString(16).padStart(2,'0')} 0%,transparent 70%)`,filter:'blur(60px)'}}/>
      <div style={{position:'absolute',bottom:'-20%',right:'-10%',width:'55%',height:'55%',background:`radial-gradient(ellipse,${c2}${Math.round(op*.7*255).toString(16).padStart(2,'0')} 0%,transparent 70%)`,filter:'blur(80px)'}}/>
      <div style={{position:'absolute',top:'40%',left:'35%',width:'35%',height:'35%',background:'radial-gradient(ellipse,rgba(167,139,250,.12) 0%,transparent 70%)',filter:'blur(50px)'}}/>
    </div>
  );
}

function Logo({size=20}){
  return(
    <div style={{display:'flex',alignItems:'center',gap:10}}>
      <div style={{width:size+4,height:size+4,borderRadius:8,background:`linear-gradient(135deg,${C.g},${C.blue})`,display:'flex',alignItems:'center',justifyContent:'center',boxShadow:`0 0 12px ${C.g}44`}}>
        <svg width={size*.6} height={size*.6} viewBox="0 0 16 16" fill="none">
          <polyline points="1,12 5,7 8,10 11,4 15,7" stroke="#020c07" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
      <div className="syne" style={{fontSize:size*.75,letterSpacing:'-.03em'}}>JM<span style={{color:C.g}}>Analyze</span>Tool</div>
    </div>
  );
}

function Nav({screen,setScreen}){
  const links=[{id:'builder',label:'Report Builder'},{id:'reports',label:'Rapporten'},{id:'admin',label:'Beheer'}];
  return(
    <nav style={{position:'sticky',top:0,zIndex:100,display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 28px',height:54,background:'rgba(6,7,9,.85)',backdropFilter:'blur(20px)',borderBottom:`1px solid ${C.border}`}}>
      <div style={{display:'flex',alignItems:'center',gap:32}}>
        <Logo/>
        <div style={{display:'flex',gap:2}}>
          {links.map(l=>(
            <button key={l.id} onClick={()=>setScreen(l.id)} style={{background:screen===l.id?C.glass2:'none',border:'none',color:screen===l.id?C.text:C.muted,padding:'6px 13px',borderRadius:8,cursor:'pointer',fontFamily:'Space Grotesk',fontSize:13,fontWeight:600,transition:'all .15s'}}>{l.label}</button>
          ))}
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:30,height:30,borderRadius:'50%',background:`linear-gradient(135deg,${C.g},${C.blue})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:C.bg,boxShadow:`0 0 10px ${C.g}44`}}>JM</div>
        <span style={{fontSize:12,color:C.muted}}>jm@metsa.nl</span>
      </div>
    </nav>
  );
}

function Badge({children,color=C.g,small=false}){
  return(<span style={{display:'inline-flex',alignItems:'center',gap:4,padding:small?'1px 6px':'3px 9px',borderRadius:99,background:`${color}18`,border:`1px solid ${color}40`,color,fontSize:small?10:11,fontWeight:700,letterSpacing:'.03em'}}>{children}</span>);
}

function SL({children,accent}){
  return(
    <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:accent?'rgba(255,255,255,.35)':'rgba(255,255,255,.2)',marginBottom:14,display:'flex',alignItems:'center',gap:8}}>
      {accent&&<div style={{width:14,height:2,background:accent,borderRadius:1,boxShadow:`0 0 6px ${accent}`,flexShrink:0}}/>}
      {children}
    </div>
  );
}

function RadialKpi({label,value,sub,pct,color=C.g,unit='%'}){
  const r=28,circ=2*Math.PI*r;
  return(
    <div className="glass" style={{padding:'16px 14px',textAlign:'center',position:'relative',overflow:'hidden'}}>
      <div style={{position:'absolute',inset:0,borderRadius:16,background:`radial-gradient(ellipse at 50% 110%,${color}10 0%,transparent 60%)`}}/>
      {pct!=null?(
        <div style={{display:'flex',justifyContent:'center',marginBottom:6}}>
          <svg width={66} height={66} viewBox="0 0 66 66">
            <circle cx={33} cy={33} r={r} fill="none" stroke={C.dim} strokeWidth={5}/>
            <circle cx={33} cy={33} r={r} fill="none" stroke={color} strokeWidth={5}
              strokeDasharray={circ} strokeDashoffset={circ*(1-Math.min(pct,100)/100)}
              strokeLinecap="round" transform="rotate(-90 33 33)"
              style={{filter:`drop-shadow(0 0 5px ${color}88)`}}/>
            <text x={33} y={37} textAnchor="middle" fill={color} fontFamily="Space Mono" fontSize={11} fontWeight={700}>{value}{unit}</text>
          </svg>
        </div>
      ):(
        <div className="mono" style={{fontSize:28,fontWeight:700,color,textShadow:`0 0 20px ${color}66`,marginBottom:6,lineHeight:1}}>{value}<span style={{fontSize:13,marginLeft:2}}>{unit}</span></div>
      )}
      <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:C.muted,marginBottom:2}}>{label}</div>
      {sub&&<div style={{fontSize:11,color:C.muted,marginTop:2}}>{sub}</div>}
    </div>
  );
}

// ── 3D TIMELINE ───────────────────────────────────────────────
function Timeline3D(){
  const segs=[
    {type:'run',s:0,e:.12,c:C.g},{type:'stop',s:.12,e:.16,c:C.red},
    {type:'run',s:.16,e:.28,c:C.g},{type:'format',s:.28,e:.30,c:C.blue},
    {type:'run',s:.30,e:.44,c:C.g},{type:'stop',s:.44,e:.51,c:C.red},
    {type:'run',s:.51,e:.60,c:C.g},{type:'reject',s:.60,e:.63,c:C.amber},
    {type:'run',s:.63,e:.72,c:C.g},{type:'stop',s:.72,e:.77,c:C.red},
    {type:'run',s:.77,e:1,c:C.g},
  ];
  return(
    <div style={{padding:'0 4px'}}>
      <div style={{perspective:600,perspectiveOrigin:'50% 30%',marginBottom:16}}>
        <div style={{transform:'rotateX(38deg)',transformOrigin:'center bottom',position:'relative',borderRadius:10,overflow:'hidden',height:56,boxShadow:'0 20px 40px rgba(0,0,0,.6)'}}>
          <div style={{position:'absolute',inset:0,background:'#0c0e14'}}/>
          {[.25,.5,.75].map(p=><div key={p} style={{position:'absolute',top:`${p*100}%`,left:0,right:0,height:1,background:'rgba(255,255,255,.04)'}}/>)}
          {segs.map((s,i)=>(
            <div key={i} style={{position:'absolute',top:0,bottom:0,left:`${s.s*100}%`,width:`${(s.e-s.s)*100}%`,background:s.type==='run'?`linear-gradient(180deg,${s.c}28,${s.c}14)`:`${s.c}55`,borderRight:s.type!=='run'?`1px solid ${s.c}88`:undefined,borderLeft:s.type!=='run'?`1px solid ${s.c}44`:undefined}}>
              {s.type==='run'&&<div style={{position:'absolute',top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${s.c}88,transparent)`}}/>}
              {s.type!=='run'&&<div style={{position:'absolute',inset:0,background:'repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(0,0,0,.15) 4px,rgba(0,0,0,.15) 8px)'}}/>}
            </div>
          ))}
          <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent 0%,${C.g}88 20%,${C.g}44 60%,transparent 100%)`}}/>
        </div>
        <div style={{height:16,background:`linear-gradient(to bottom,rgba(0,229,160,.06),transparent)`,transform:'rotateX(38deg) translateY(1px)',transformOrigin:'top center',marginTop:-1}}/>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:12}}>
        {['05:30','07:30','09:30','11:30','13:30'].map(t=><span key={t} className="mono" style={{fontSize:10,color:C.muted}}>{t}</span>)}
      </div>
      <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>
        {[['Lopend',C.g],['Stilstand',C.red],['Formaatwisseling',C.blue],['Sluis open',C.amber]].map(([l,c])=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:5}}>
            <div style={{width:10,height:6,borderRadius:2,background:c,boxShadow:`0 0 6px ${c}88`}}/>
            <span style={{fontSize:11,color:C.muted}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── 3D BAR CHART ──────────────────────────────────────────────
function Bar3D({label,value,max,color,unit='min',idx=0}){
  const pct=Math.min(100,value/max*100);
  const depth=8;
  const barH=Math.max(4,pct*1.4);
  return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,flex:1}}>
      <div className="mono" style={{fontSize:12,fontWeight:700,color,textShadow:`0 0 10px ${color}88`}}>{value}{unit}</div>
      <div style={{position:'relative',width:36,height:140,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
        {/* 3D bar */}
        <div style={{position:'relative',width:28,height:`${barH}%`,minHeight:4}}>
          {/* Front face */}
          <div style={{position:'absolute',inset:0,background:`linear-gradient(to top,${color}cc,${color})`,borderRadius:'4px 4px 0 0',boxShadow:`0 0 16px ${color}55`,transition:'height 1s ease'}}/>
          {/* Top face */}
          <div style={{position:'absolute',top:-depth*.6,left:depth*.6,right:-depth*.6,height:depth*.8,background:`${color}ee`,transform:'skewX(-45deg) scaleY(.5)',transformOrigin:'bottom left',borderRadius:'2px 2px 0 0'}}/>
          {/* Right face */}
          <div style={{position:'absolute',top:-depth*.5,right:-depth*.6,width:depth*.6,bottom:0,background:`${color}66`,transform:'skewY(-45deg)',transformOrigin:'top left'}}/>
        </div>
        {/* Floor line */}
        <div style={{position:'absolute',bottom:0,left:-4,right:-4,height:1,background:'rgba(255,255,255,.12)'}}/>
      </div>
      <div style={{fontSize:10,color:C.muted,textAlign:'center',lineHeight:1.3,maxWidth:60}}>{label}</div>
    </div>
  );
}

// ── HORIZONTAL BAR ────────────────────────────────────────────
function HBar({label,value,max,color,sub,unit=''}){
  const pct=Math.min(100,value/max*100);
  return(
    <div style={{marginBottom:12}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:5}}>
        <span style={{fontSize:12}}>{label}</span>
        <span className="mono" style={{fontSize:12,color,fontWeight:700,textShadow:`0 0 8px ${color}66`}}>{value}{unit}</span>
      </div>
      <div style={{height:8,background:'rgba(255,255,255,.05)',borderRadius:4,overflow:'visible',position:'relative'}}>
        <div style={{height:'100%',width:`${pct}%`,background:`linear-gradient(90deg,${color}99,${color})`,borderRadius:4,boxShadow:`0 0 10px ${color}66`,transition:'width 1s ease',position:'relative'}}>
          <div style={{position:'absolute',right:-2,top:-3,width:14,height:14,borderRadius:'50%',background:color,boxShadow:`0 0 10px ${color}`,border:`2px solid ${C.bg}`}}/>
        </div>
      </div>
      {sub&&<div style={{fontSize:10,color:C.muted,marginTop:3}}>{sub}</div>}
    </div>
  );
}

// ── SPEED HEATMAP ─────────────────────────────────────────────
function SpeedHeatmap(){
  // 32 time buckets (15min each ~8h shift)
  const data=[0,0,280,295,260,310,0,290,275,280,290,0,305,295,280,0,260,270,280,0,295,300,0,285,275,260,280,295,0,305,290,285];
  const maxSpd=350;
  function getColor(spd){
    if(spd===0)return'rgba(255,71,87,.35)';
    const pct=spd/maxSpd;
    if(pct>.85)return`rgba(0,229,160,.9)`;
    if(pct>.7)return`rgba(0,229,160,.55)`;
    if(pct>.5)return`rgba(245,158,11,.6)`;
    return`rgba(245,158,11,.3)`;
  }
  const times=['05:30','07:00','08:30','10:00','11:30','13:00','13:30'];
  return(
    <div>
      <SL accent={C.amber}>Snelheid heatmap — per 15 min</SL>
      <div style={{display:'grid',gridTemplateColumns:`repeat(${data.length},1fr)`,gap:2,marginBottom:6}}>
        {data.map((spd,i)=>(
          <div key={i} title={spd?`${spd} m/min`:'Stilstand'} style={{height:28,borderRadius:3,background:getColor(spd),boxShadow:spd>280?`0 0 6px ${C.g}66`:undefined,transition:'all .3s'}}/>
        ))}
      </div>
      <div style={{display:'flex',justifyContent:'space-between'}}>
        {times.map(t=><span key={t} className="mono" style={{fontSize:9,color:C.muted}}>{t}</span>)}
      </div>
      <div style={{display:'flex',gap:12,marginTop:10}}>
        {[['> 85% max',C.g,'rgba(0,229,160,.9)'],['70–85%','rgba(0,229,160,.55)','rgba(0,229,160,.55)'],['50–70%',C.amber,'rgba(245,158,11,.6)'],['Stilstand',C.red,'rgba(255,71,87,.35)']].map(([l,c,bg])=>(
          <div key={l} style={{display:'flex',alignItems:'center',gap:4}}>
            <div style={{width:12,height:8,borderRadius:2,background:bg}}/>
            <span style={{fontSize:10,color:C.muted}}>{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── REJECT WATERFALL ──────────────────────────────────────────
function RejectWaterfall(){
  const steps=[
    {label:'Totale shift',value:510,color:C.muted,isTotal:true},
    {label:'Lopend',value:416,color:C.g,isPos:true},
    {label:'Gepland stop',value:20,color:C.dim,isNeg:true},
    {label:'Machine down',value:41,color:C.red,isNeg:true},
    {label:'Formaat',value:27,color:C.blue,isNeg:true},
    {label:'Sluis open',value:38,color:C.amber,isNeg:true},
  ];
  const max=510;
  return(
    <div>
      <SL accent={C.red}>Reject &amp; downtime waterval — minuten</SL>
      <div style={{display:'flex',alignItems:'flex-end',gap:8,height:130,marginBottom:8}}>
        {steps.map((s,i)=>{
          const h=s.value/max*110;
          return(
            <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <div className="mono" style={{fontSize:10,color:s.color,fontWeight:700}}>{s.value}</div>
              <div style={{width:'100%',height:h,background:s.isTotal?'rgba(255,255,255,.08)':`linear-gradient(to top,${s.color}99,${s.color}dd)`,borderRadius:'4px 4px 0 0',boxShadow:s.isTotal?'none':`0 0 12px ${s.color}44`,position:'relative'}}>
                {!s.isTotal&&(
                  <div style={{position:'absolute',top:-6,left:'50%',transform:'translateX(-50%)',width:2,height:6,background:s.color,opacity:.5}}/>
                )}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:'flex',gap:8}}>
        {steps.map(s=>(
          <div key={s.label} style={{flex:1,fontSize:9,color:C.muted,textAlign:'center',lineHeight:1.3}}>{s.label}</div>
        ))}
      </div>
    </div>
  );
}

// ── ORDER SPEED CHART ─────────────────────────────────────────
function OrderSpeedChart(){
  const orders=[
    {order:'305612',prod:'PRO225R',gsm:225,w:900,actual:290,max:350,mt:1.77,tonH:6.7},
    {order:'305516',prod:'PRI270R',gsm:270,w:900,actual:295,max:350,mt:1.23,tonH:7.1},
    {order:'305454',prod:'PRI305R',gsm:305,w:749,actual:225,max:335,mt:0.24,tonH:5.3},
    {order:'305449',prod:'PRI280R',gsm:280,w:730,actual:190,max:329,mt:0.82,tonH:2.7},
    {order:'305500',prod:'PRI170R',gsm:170,w:995,actual:195,max:350,mt:0.54,tonH:3.1},
    {order:'305544',prod:'PRI255R',gsm:255,w:1000,actual:265,max:350,mt:0.53,tonH:4.1},
  ];
  return(
    <div>
      <SL accent={C.blue}>Snelheidsbenutting per order</SL>
      {orders.map((o,i)=>{
        const util=o.actual/o.max*100;
        const barColor=util>85?C.g:util>70?C.amber:C.red;
        return(
          <div key={i} style={{marginBottom:10,padding:'10px 12px',background:'rgba(255,255,255,.02)',borderRadius:8,border:`1px solid ${C.border}`}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <span className="mono" style={{fontSize:11,color:C.blue}}>{o.order}</span>
                <span style={{fontSize:11,color:C.muted}}>{o.gsm}g · {o.w}mm</span>
              </div>
              <div style={{display:'flex',gap:10,alignItems:'center'}}>
                <span className="mono" style={{fontSize:11,color:barColor}}>{Math.round(util)}%</span>
                <span style={{fontSize:11,color:C.muted}}>{o.tonH} ton/h</span>
              </div>
            </div>
            <div style={{position:'relative',height:6,background:'rgba(255,255,255,.06)',borderRadius:3,overflow:'visible'}}>
              {/* Max speed marker */}
              <div style={{position:'absolute',right:0,top:-4,bottom:-4,width:2,background:'rgba(255,255,255,.2)',borderRadius:1}}/>
              {/* Actual */}
              <div style={{height:'100%',width:`${util}%`,background:`linear-gradient(90deg,${barColor}88,${barColor})`,borderRadius:3,boxShadow:`0 0 8px ${barColor}55`}}/>
              {/* Dot */}
              <div style={{position:'absolute',left:`${util}%`,top:'50%',transform:'translate(-50%,-50%)',width:10,height:10,borderRadius:'50%',background:barColor,boxShadow:`0 0 8px ${barColor}`,border:`2px solid ${C.bg}`}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
              <span style={{fontSize:9,color:C.muted}}>0 m/min</span>
              <span className="mono" style={{fontSize:9,color:C.muted}}>{o.actual} / {o.max} m/min</span>
              <span style={{fontSize:9,color:C.muted}}>max</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── IMPACT MATRIX ─────────────────────────────────────────────
function ImpactMatrix(){
  const items=[

// ── DONUT CHART ───────────────────────────────────────────────
function DonutChart({data,size=130}){
  const total=data.reduce((s,d)=>s+d.value,0);
  let offset=0;
  const r=44,circ=2*Math.PI*r,cx=size/2,cy=size/2;
  const slices=data.map(d=>{
    const pct=d.value/total;
    const dash=circ*pct;
    const gap=circ*(1-pct);
    const rot=offset*360-90;
    offset+=pct;
    return{...d,dash,gap,rot};
  });
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {slices.map((s,i)=>(
        <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.color} strokeWidth={10}
          strokeDasharray={`${s.dash} ${s.gap}`}
          transform={`rotate(${s.rot} ${cx} ${cy})`}
          strokeLinecap="round"
          style={{filter:`drop-shadow(0 0 6px ${s.color}88)`}}
        />
      ))}
      <circle cx={cx} cy={cy} r={r-16} fill={C.dim} opacity={.3}/>
    </svg>
  );
}

          {tab==='users'&&<table style={{width:'100%',borderCollapse:'collapse'}}><thead><tr>{['Naam','E-mail','Vestiging','Rol','Status','Aangemaakt','Actie'].map(h=><th key={h} style={{textAlign:'left',padding:'8px 12px',borderBottom:`1px solid ${C.border}`,fontSize:10,textTransform:'uppercase',color:C.muted}}>{h}</th>)}</tr></thead><tbody>{users.map(u=><tr key={u.email} style={{borderBottom:`1px solid ${C.border}`}}><td style={{padding:'10px 12px',fontSize:13,fontWeight:600}}>{u.name}</td><td className="mono" style={{padding:'10px 12px',fontSize:12,color:C.muted}}>{u.email}</td><td style={{padding:'10px 12px',fontSize:12,color:C.muted}}>{u.loc}</td><td style={{padding:'10px 12px'}}><Badge color={u.role==='admin'?C.purple:C.blue} small>{u.role}</Badge></td><td style={{padding:'10px 12px'}}><Badge color={u.active?C.g:C.red} small>{u.active?'Actief':'Geblokkeerd'}</Badge></td><td style={{padding:'10px 12px',fontSize:12,color:C.muted}}>{u.date}</td><td style={{padding:'10px 12px'}}><button style={{background:`${u.active?C.red:C.g}15`,color:u.active?C.red:C.g,border:`1px solid ${u.active?C.red:C.g}35`,borderRadius:6,padding:'4px 10px',cursor:'pointer',fontFamily:'Space Grotesk',fontSize:11,fontWeight:700}}>{u.active?'Blokkeer':'Activeer'}</button></td></tr>)}</tbody></table>}
          {tab==='audit'&&<table style={{width:'100%',borderCollapse:'collapse'}}><thead><tr>{['Tijd','Actie','Gebruiker','Details'].map(h=><th key={h} style={{textAlign:'left',padding:'8px 12px',borderBottom:`1px solid ${C.border}`,fontSize:10,textTransform:'uppercase',color:C.muted}}>{h}</th>)}</tr></thead><tbody>{audit.map((a,i)=><tr key={i} style={{borderBottom:`1px solid ${C.border}`}}><td className="mono" style={{padding:'9px 12px',fontSize:12,color:C.muted}}>{a.time}</td><td style={{padding:'9px 12px'}}><Badge color={a.action.includes('ai')?C.purple:a.action.includes('login')?C.blue:C.g} small>{a.action}</Badge></td><td className="mono" style={{padding:'9px 12px',fontSize:12,color:C.muted}}>{a.user}</td><td className="mono" style={{padding:'9px 12px',fontSize:11,color:C.muted}}>{a.detail}</td></tr>)}</tbody></table>}
          {tab==='reports'&&<table style={{width:'100%',borderCollapse:'collapse'}}><thead><tr>{['Tijd','Titel','Gebruiker','Route','Verloopt'].map(h=><th key={h} style={{textAlign:'left',padding:'8px 12px',borderBottom:`1px solid ${C.border}`,fontSize:10,textTransform:'uppercase',color:C.muted}}>{h}</th>)}</tr></thead><tbody>{[['27 apr 14:22','Sheeter ochtend — hoge downtime','jm@metsa.nl','Complete','27 mei'],['26 apr 22:47','DW08 nacht — alarm 1042 spike','pp@metsa.nl','Basic+','26 mei'],['25 apr 17:03','Sheeter middag — goede shift','jm@metsa.nl','Basic','25 mei']].map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.border}`}}><td className="mono" style={{padding:'9px 12px',fontSize:12,color:C.muted}}>{r[0]}</td><td style={{padding:'9px 12px',fontSize:12}}>{r[1]}</td><td className="mono" style={{padding:'9px 12px',fontSize:12,color:C.muted}}>{r[2]}</td><td style={{padding:'9px 12px'}}><Badge color={r[3]==='Complete'?C.blue:C.muted} small>{r[3]}</Badge></td><td style={{padding:'9px 12px',fontSize:12,color:C.muted}}>{r[4]}</td></tr>)}</tbody></table>}
        </div>
      </div>
    </div>
  );
}

// ── TWEAKS ────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"accentColor":"#00e5a0","showGrid":true,"meshIntensity":12}/*EDITMODE-END*/;

function TweaksPanel({tweaks,setTweak,visible,onClose}){
  if(!visible)return null;
  return(
    <div style={{position:'fixed',bottom:24,right:24,zIndex:9999,background:'rgba(10,11,16,.95)',border:`1px solid ${C.border2}`,borderRadius:14,padding:'18px 20px',width:230,backdropFilter:'blur(20px)',boxShadow:'0 20px 60px rgba(0,0,0,.7)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}><span style={{fontWeight:700,fontSize:13}}>Tweaks</span><button onClick={onClose} style={{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:16}}>✕</button></div>
      <div style={{marginBottom:16}}>
        <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:C.muted,letterSpacing:'.06em',marginBottom:8}}>Accent kleur</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {[['#00e5a0','Groen'],['#60a5fa','Blauw'],['#f59e0b','Amber'],['#a78bfa','Paars']].map(([c,l])=>(
            <button key={c} onClick={()=>setTweak('accentColor',c)} style={{display:'inline-flex',alignItems:'center',gap:5,background:tweaks.accentColor===c?`${c}20`:'none',border:`1px solid ${tweaks.accentColor===c?c:C.border2}`,borderRadius:6,padding:'4px 8px',cursor:'pointer',color:C.text,fontFamily:'Space Grotesk',fontSize:11}}>
              <div style={{width:8,height:8,borderRadius:'50%',background:c,boxShadow:`0 0 6px ${c}`}}/>{l}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('login');
  const [tweaksVisible,setTweaksVisible]=useState(false);
  const [tweaks,setTweaksState]=useState(TWEAK_DEFAULTS);
  const setTweak=(k,v)=>setTweaksState(p=>{const next={...p,[k]:v};window.parent?.postMessage({type:'__edit_mode_set_keys',edits:next},'*');return next;});
  useEffect(()=>{
    const h=e=>{if(e.data?.type==='__activate_edit_mode')setTweaksVisible(true);if(e.data?.type==='__deactivate_edit_mode')setTweaksVisible(false);};
    window.addEventListener('message',h);
    window.parent?.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);
  return(
    <>
      {screen==='login'   &&<LoginScreen setScreen={setScreen}/>}
      {screen==='builder' &&<BuilderScreen setScreen={setScreen}/>}
      {screen==='reports' &&<ReportsScreen setScreen={setScreen}/>}
      {screen==='admin'   &&<AdminScreen setScreen={setScreen}/>}
      <TweaksPanel tweaks={tweaks} setTweak={setTweak} visible={tweaksVisible} onClose={()=>{setTweaksVisible(false);window.parent?.postMessage({type:'__edit_mode_dismissed'},'*');}}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
