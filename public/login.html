<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JMAnalyzeTool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060709;--g:#00e5a0;--g2:#00b87a;
  --text:#f0f2fa;--muted:#4a5070;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);
  --glass:rgba(255,255,255,.03);
  --red:#ff4757;--green:#00e5a0;--blue:#60a5fa;
}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Space Grotesk',system-ui,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
.syne{font-family:'Syne',sans-serif;font-weight:800}
/* noise */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.025;pointer-events:none;z-index:100}
/* mesh */
.mesh{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.mesh-1{position:absolute;top:-20%;left:-10%;width:60%;height:60%;background:radial-gradient(ellipse,rgba(0,229,160,.14) 0%,transparent 70%);filter:blur(60px)}
.mesh-2{position:absolute;bottom:-20%;right:-10%;width:55%;height:55%;background:radial-gradient(ellipse,rgba(96,165,250,.09) 0%,transparent 70%);filter:blur(80px)}
/* grid */
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}
/* layout */
.page{min-height:100vh;display:grid;place-items:center;padding:24px;position:relative;z-index:1}
.card{width:min(100%,420px);background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:16px;padding:30px}
/* logo */
.logo-icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--g),var(--blue));display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px rgba(0,229,160,.4),0 10px 30px rgba(0,0,0,.5);margin:0 auto 14px}
.logo-icon svg{display:block}
.logo-text{font-size:26px;letter-spacing:-.04em;text-align:center;margin-bottom:5px}
.logo-sub{color:var(--muted);font-size:13px;text-align:center;margin-bottom:28px}
/* tabs */
.tabs{display:grid;grid-template-columns:1fr 1fr;background:rgba(255,255,255,.04);border-radius:11px;padding:3px;margin-bottom:22px}
.tab{border:none;border-radius:9px;padding:9px 0;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;transition:all .2s}
.tab.active{background:linear-gradient(135deg,var(--g),var(--g2));color:#020c07;box-shadow:0 2px 12px rgba(0,229,160,.4)}
.tab:not(.active){background:transparent;color:var(--muted)}
/* form */
.field{margin-bottom:14px}
.field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:7px}
.field input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:var(--text);border-radius:10px;padding:11px 14px;font-family:'Space Grotesk',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.field input:focus{border-color:var(--g)}
/* button */
.btn-primary{width:100%;border:none;border-radius:10px;background:var(--g);color:#020c07;padding:13px 0;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 0 24px rgba(0,229,160,.35),0 4px 12px rgba(0,0,0,.4);transition:all .2s;letter-spacing:-.01em}
.btn-primary:hover{box-shadow:0 0 36px rgba(0,229,160,.55),0 6px 20px rgba(0,0,0,.5);transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
/* messages */
.msg{min-height:20px;margin-bottom:10px;font-size:13px}
.msg.err{color:var(--red)}
.msg.ok{color:var(--green)}
/* hint */
.hint{text-align:center;color:rgba(255,255,255,.18);font-size:12px;margin-top:20px}
.hidden{display:none}
/* google */
.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:var(--text);border-radius:10px;padding:12px 0;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:18px}
.google-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.22)}
.divider{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
.divider span{color:var(--muted);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.google-msg{font-size:13px;margin-bottom:12px;min-height:18px}
</style>
</head>
<body>
<div class="mesh"><div class="mesh-1"></div><div class="mesh-2"></div></div>
<div class="grid-bg"></div>

<main class="page">
  <div style="width:min(100%,420px);position:relative;z-index:1">
    <div class="logo-icon">
      <svg width="26" height="26" viewBox="0 0 16 16" fill="none">
        <polyline points="1,12 5,7 8,10 11,4 15,7" stroke="#020c07" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="syne logo-text">JM<span style="color:var(--g)">Analyze</span>Tool</div>
    <div class="logo-sub">Production analysis · Secure accounts</div>

    <div class="card">
      <div id="google-msg" class="google-msg"></div>
      <button class="google-btn" id="google-btn" onclick="signInGoogle()">
        <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908C16.658 14.015 17.64 11.707 17.64 9.2z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
        </svg>
        Continue with Google
      </button>
      <div class="divider"><span>or sign in with password</span></div>
      <div class="tabs">
        <button class="tab active" id="tab-login">Log in</button>
        <button class="tab" id="tab-register">Create account</button>
      </div>

      <section id="login-form">
        <div class="field"><label for="login-email">Email</label><input id="login-email" type="email" autocomplete="username" placeholder="name@company.com"></div>
        <div class="field"><label for="login-pass">Password</label><input id="login-pass" type="password" autocomplete="current-password" placeholder="Password"></div>
        <div id="login-msg" class="msg err"></div>
        <button class="btn-primary" id="login-btn">Log in</button>
        <button type="button" id="show-reset-btn" style="width:100%;border:none;background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;margin-top:14px;cursor:pointer">Reset password</button>
      </section>

      <section id="register-form" class="hidden">
        <div class="field"><label for="reg-name">Name</label><input id="reg-name" autocomplete="name" placeholder="John Smith"></div>
        <div class="field"><label for="reg-email">Email</label><input id="reg-email" type="email" autocomplete="username" placeholder="name@company.com"></div>
        <div class="field"><label for="reg-location">Site / team</label><input id="reg-location" placeholder="e.g. Winschoten, Excellent team"></div>
        <div class="field"><label for="reg-pass">Password</label><input id="reg-pass" type="password" autocomplete="new-password" placeholder="Minimum 8 characters"></div>
        <div class="field"><label for="reg-code">Unique account code</label><input id="reg-code" autocomplete="off" placeholder="Account code"></div>
        <div id="reg-msg" class="msg err"></div>
        <button class="btn-primary" id="register-btn">Create account</button>
      </section>

      <section id="reset-form" class="hidden">
        <div class="field"><label for="reset-email">Email</label><input id="reset-email" type="email" autocomplete="username" placeholder="name@company.com"></div>
        <div class="field"><label for="reset-pass">New password</label><input id="reset-pass" type="password" autocomplete="new-password" placeholder="Minimum 8 characters"></div>
        <div class="field"><label for="reset-code">Unique account code</label><input id="reset-code" autocomplete="off" placeholder="Account code"></div>
        <div id="reset-msg" class="msg err"></div>
        <button class="btn-primary" id="reset-btn">Reset password</button>
        <button type="button" id="back-login-btn" style="width:100%;border:none;background:transparent;color:var(--muted);font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;margin-top:14px;cursor:pointer">Back to log in</button>
      </section>
    </div>

    <div class="hint">Accounts can only be created with your unique code.</div>
  </div>
</main>

<script>
const $ = id => document.getElementById(id);
const tokenKey = 'jm-token';
const userKey = 'jm-user';

function show(mode) {
  $('tab-login').classList.toggle('active', mode === 'login');
  $('tab-register').classList.toggle('active', mode === 'register');
  $('login-form').classList.toggle('hidden', mode !== 'login');
  $('register-form').classList.toggle('hidden', mode !== 'register');
  $('reset-form').classList.toggle('hidden', mode !== 'reset');
}

async function api(url, body) {
  const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Action failed.');
  return data;
}

function saveSession(data) {
  localStorage.setItem(tokenKey, data.token);
  localStorage.setItem(userKey, JSON.stringify(data.user));
  window.location.href = '/report';
}

async function checkExistingSession() {
  const token = localStorage.getItem(tokenKey);
  if (!token) return;
  try {
    const res = await fetch('/api/auth/me', { headers: { Authorization: `Bearer ${token}` } });
    if (!res.ok) throw new Error('invalid');
    window.location.href = '/report';
  } catch (_) {
    localStorage.removeItem(tokenKey);
    localStorage.removeItem(userKey);
  }
}

async function login() {
  $('login-msg').textContent = '';
  $('login-btn').disabled = true;
  try { saveSession(await api('/api/auth/login', { email: $('login-email').value, password: $('login-pass').value })); }
  catch (e) { $('login-msg').textContent = e.message; }
  finally { $('login-btn').disabled = false; }
}

async function register() {
  $('reg-msg').className = 'msg err';
  $('reg-msg').textContent = '';
  $('register-btn').disabled = true;
  try {
    await api('/api/auth/register', { name: $('reg-name').value, email: $('reg-email').value, location: $('reg-location').value, password: $('reg-pass').value, inviteCode: $('reg-code').value });
    $('reg-msg').className = 'msg ok';
    $('reg-msg').textContent = 'Account created. You can now log in.';
    $('login-email').value = $('reg-email').value;
    $('login-pass').value = $('reg-pass').value;
    setTimeout(() => show('login'), 600);
  } catch (e) { $('reg-msg').className = 'msg err'; $('reg-msg').textContent = e.message; }
  finally { $('register-btn').disabled = false; }
}

async function resetPassword() {
  $('reset-msg').className = 'msg err';
  $('reset-msg').textContent = '';
  $('reset-btn').disabled = true;
  try {
    await api('/api/auth/reset-password', { email: $('reset-email').value, password: $('reset-pass').value, inviteCode: $('reset-code').value });
    $('reset-msg').className = 'msg ok';
    $('reset-msg').textContent = 'Password reset. You can now log in.';
    $('login-email').value = $('reset-email').value;
    $('login-pass').value = $('reset-pass').value;
    setTimeout(() => show('login'), 700);
  } catch (e) { $('reset-msg').className = 'msg err'; $('reset-msg').textContent = e.message; }
  finally { $('reset-btn').disabled = false; }
}

$('tab-login').onclick = () => show('login');
$('tab-register').onclick = () => show('register');
$('login-btn').onclick = login;
$('register-btn').onclick = register;
$('show-reset-btn').onclick = () => { $('reset-email').value = $('login-email').value; show('reset'); };
$('back-login-btn').onclick = () => show('login');
$('reset-btn').onclick = resetPassword;
$('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
$('reg-code').addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
$('reset-code').addEventListener('keydown', e => { if (e.key === 'Enter') resetPassword(); });
function signInGoogle() { window.location.href = '/api/auth/google'; }

async function handleGoogleCallback() {
  const params = new URLSearchParams(window.location.search);
  const authCode = params.get('_auth');
  const googleError = params.get('google_error');

  if (authCode) {
    try {
      const res = await fetch(`/api/auth/google/exchange?code=${authCode}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed.');
      saveSession(data);
    } catch (e) {
      $('google-msg').style.color = 'var(--red)';
      $('google-msg').textContent = e.message;
      history.replaceState(null, '', '/');
    }
    return;
  }

  if (googleError) {
    const msgs = { blocked: 'This Google account is not allowed to access JMAnalyzeTool.', not_configured: 'Google login is not set up yet. Use email/password.', '1': 'Google sign-in failed. Please try again.' };
    $('google-msg').style.color = 'var(--red)';
    $('google-msg').textContent = msgs[googleError] || msgs['1'];
    history.replaceState(null, '', '/');
  }
}

handleGoogleCallback();
checkExistingSession();
</script>
</body>
</html>
